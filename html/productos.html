<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo de productos</title>
    <link rel="stylesheet" href="/css/productos.css">
</head>

<body onload="cargarProductos(), cargarCategorias()">
    <div id="header">
        <button id="icono" onclick="inicio()">
            <img src="/imgNavbar/home.svg" alt="">
        </button>
        <div id="infoHeader">
            <h1>Jacom's Comerce</h1>
            <h2>Catalogo de productos</h2>
        </div>

    </div>

    <label for="opciones" id="selec">Selecciona alguna categoria para buscar tus productos:</label>
    <select id="opciones" name="opciones" onchange="buscar(this.value)">
    </select>

    <main id="cards">
    </main>

    <script src="/js/productos.js"></script>
</body>

</html>
